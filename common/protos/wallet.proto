syntax = "proto3";

package wallet;

option go_package = "ms_wallet/internal/grpc/pb";

service WalletService {
    rpc GetWallet (WalletRequest) returns (WalletResponse);
    rpc ValidateFunds (FundsRequest) returns (FundsResponse);
}

message WalletRequest {
    string user_id = 1;
}

message WalletResponse {
    double balance = 1;
    string currency = 2;
    bool is_active = 3;
}

message FundsRequest {
    string user_id = 1;
    double amount = 2;
}

message FundsResponse {
    bool is_valid = 1;
    string message = 2;
}